app:
  id: frontend
  name: frontend
  namespace: app-stack

replicaCount: 1

image:
  pullPolicy: IfNotPresent

service:
  name: frontend
  type: ClusterIP
  port: 80
  targetPort: 80

containerPort: 80

env: []

resources: {}

ingress:
  enabled: true
  name: frontend
  className: traefik
  host: ""
  path: /
  pathType: Prefix
