---
- name: Deploy app(s) to k3s
  hosts: k3s
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir }}/../.."
  tasks:
    - name: Resolve deployment inputs
      ansible.builtin.include_tasks: tasks/resolve-deployment-apps.yml

    - name: Ensure deployment dependencies are installed
      ansible.builtin.include_tasks: tasks/dependencies.yml

    - name: Configure GitLab Runner when requested
      ansible.builtin.include_tasks: tasks/gitlab-runner.yml

    - name: Ensure local registry is available when needed
      ansible.builtin.include_tasks: tasks/ensure-local-registry.yml

    - name: Deploy apps
      ansible.builtin.include_tasks: tasks/deploy-single-app.yml
      loop: "{{ deployment_app_names }}"
      loop_control:
        loop_var: deploy_app_name