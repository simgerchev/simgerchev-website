---
# Default single-app deploy target (used when app_names/app_names_csv are empty)
app_name: simgerchev-website

# Optional multi-app deployment inputs
app_names: []
app_names_csv: ""

# Image build/deploy settings
build_image: true
tag: ""
default_build_tag: "latest"
registry: "localhost:5000"

# Host bootstrap controls (Debian/Ubuntu)
install_dependencies: true
install_k3s: true
ensure_k3s_running: true
docker_apt_gpg_url: "https://download.docker.com/linux/debian/gpg"

# k3s install options (passed to the official install script)
k3s_install_channel: stable
k3s_install_extra_args: ""

# Local container registry automation
ensure_local_registry: true

# Optional GitLab Runner setup
configure_gitlab_runner: true
gitlab_runner_url: "https://gitlab.com"
gitlab_runner_registration_token: "glrt-qP9M-2oRvA8h-z6vH4rDVm86MQpwOjFhajEyMgp0OjMKdTo2cHFmYRg.01.1j0mmcyol"
gitlab_runner_executor: docker
gitlab_runner_docker_image: alpine:latest
gitlab_runner_description: "{{ inventory_hostname }}"
