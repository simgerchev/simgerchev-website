---
- name: Gather minimal facts for package management
  ansible.builtin.setup:
    gather_subset:
      - min
  when: install_dependencies | bool

- name: Fail on unsupported operating systems
  ansible.builtin.fail:
    msg: "install_dependencies is supported only on Debian/Ubuntu hosts. Current OS family: {{ ansible_os_family }}"
  when:
    - install_dependencies | bool
    - ansible_os_family != 'Debian'

- name: Install and configure Docker dependencies
  ansible.builtin.include_tasks: dependencies/docker.yml
  when: install_dependencies | bool

- name: Install and configure k3s dependencies
  ansible.builtin.include_tasks: dependencies/k3s.yml
  when: install_dependencies | bool

- name: Resolve kubectl command for deployment
  ansible.builtin.include_tasks: dependencies/kubectl.yml
  when: install_dependencies | bool

- name: Set default kubectl command when dependency bootstrap is disabled
  ansible.builtin.set_fact:
    kubectl_cmd: kubectl
  when: not (install_dependencies | bool)
