---
- name: Refresh apt package index
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install base dependency packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
  become: true

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Docker apt repository signing key
  ansible.builtin.get_url:
    url: "{{ docker_apt_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true

- name: Resolve Docker apt repository settings
  ansible.builtin.set_fact:
    docker_apt_distribution: "{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}"
    docker_apt_architecture: "{{ docker_architecture_map.get(ansible_architecture, 'amd64') }}"
  vars:
    docker_architecture_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_apt_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ docker_apt_distribution }} {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: true
  become: true

- name: Install Docker Engine packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true
  when:
    - (build_image | bool) or (ensure_local_registry | bool)
    - not ansible_check_mode
