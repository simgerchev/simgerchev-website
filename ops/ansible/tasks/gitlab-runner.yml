---
- name: Gather minimal facts for GitLab Runner setup
  ansible.builtin.setup:
    gather_subset:
      - min
  when: configure_gitlab_runner | bool

- name: Fail on unsupported operating systems
  ansible.builtin.fail:
    msg: "configure_gitlab_runner is supported only on Debian/Ubuntu hosts. Current OS family: {{ ansible_os_family }}"
  when:
    - configure_gitlab_runner | bool
    - ansible_os_family != 'Debian'

- name: Install GitLab Runner repo prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: configure_gitlab_runner | bool

- name: Configure GitLab Runner apt repository
  ansible.builtin.command: bash -c "curl -fsSL https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh | bash"
  args:
    creates: /etc/apt/sources.list.d/runner_gitlab-runner.list
  become: true
  when:
    - configure_gitlab_runner | bool
    - not ansible_check_mode

- name: Install GitLab Runner package
  ansible.builtin.apt:
    name: gitlab-runner
    state: present
    update_cache: true
  become: true
  when: configure_gitlab_runner | bool

- name: Ensure GitLab Runner service is enabled and running
  ansible.builtin.service:
    name: gitlab-runner
    state: started
    enabled: true
  become: true
  when:
    - configure_gitlab_runner | bool
    - not ansible_check_mode

- name: Check if runner config already exists
  ansible.builtin.stat:
    path: /etc/gitlab-runner/config.toml
  register: gitlab_runner_config_stat
  become: true
  when: configure_gitlab_runner | bool

- name: Check if runner is already registered
  ansible.builtin.command: grep -q '^\[\[runners\]\]' /etc/gitlab-runner/config.toml
  register: gitlab_runner_registered_check
  changed_when: false
  failed_when: false
  become: true
  when:
    - configure_gitlab_runner | bool
    - gitlab_runner_config_stat.stat.exists | default(false)

- name: Resolve GitLab Runner token mode
  ansible.builtin.set_fact:
    gitlab_runner_use_auth_token: "{{ gitlab_runner_registration_token.startswith('glrt-') }}"
  when:
    - configure_gitlab_runner | bool
    - gitlab_runner_registration_token | length > 0

- name: Register GitLab Runner with authentication token (docker executor)
  ansible.builtin.command: >-
    gitlab-runner register
    --non-interactive
    --url "{{ gitlab_runner_url }}"
    --token "{{ gitlab_runner_registration_token }}"
    --executor "{{ gitlab_runner_executor }}"
    --description "{{ gitlab_runner_description }}"
    --docker-image "{{ gitlab_runner_docker_image }}"
  become: true
  when:
    - configure_gitlab_runner | bool
    - not ansible_check_mode
    - gitlab_runner_url | length > 0
    - gitlab_runner_registration_token | length > 0
    - gitlab_runner_use_auth_token | bool
    - gitlab_runner_executor == 'docker'
    - not (gitlab_runner_registered_check.rc | default(1) == 0)

- name: Register GitLab Runner with authentication token (non-docker executor)
  ansible.builtin.command: >-
    gitlab-runner register
    --non-interactive
    --url "{{ gitlab_runner_url }}"
    --token "{{ gitlab_runner_registration_token }}"
    --executor "{{ gitlab_runner_executor }}"
    --description "{{ gitlab_runner_description }}"
  become: true
  when:
    - configure_gitlab_runner | bool
    - not ansible_check_mode
    - gitlab_runner_url | length > 0
    - gitlab_runner_registration_token | length > 0
    - gitlab_runner_use_auth_token | bool
    - gitlab_runner_executor != 'docker'
    - not (gitlab_runner_registered_check.rc | default(1) == 0)

- name: Register GitLab Runner with legacy registration token
  ansible.builtin.command: >-
    gitlab-runner register
    --non-interactive
    --url "{{ gitlab_runner_url }}"
    --registration-token "{{ gitlab_runner_registration_token }}"
    --executor "{{ gitlab_runner_executor }}"
    --description "{{ gitlab_runner_description }}"
    --tag-list "{{ gitlab_runner_tags }}"
    --run-untagged="{{ gitlab_runner_run_untagged | ternary('true', 'false') }}"
    --locked="{{ gitlab_runner_locked | ternary('true', 'false') }}"
  become: true
  when:
    - configure_gitlab_runner | bool
    - not ansible_check_mode
    - gitlab_runner_url | length > 0
    - gitlab_runner_registration_token | length > 0
    - not (gitlab_runner_use_auth_token | bool)
    - not (gitlab_runner_registered_check.rc | default(1) == 0)
