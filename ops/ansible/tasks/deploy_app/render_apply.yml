---
- name: Create render directory
  ansible.builtin.tempfile:
    state: directory
    suffix: "-k8s-{{ app.id | default(deploy_app_name) }}"
  register: render_dir

- name: Render namespace template
  ansible.builtin.template:
    src: "{{ templates_dir }}/namespace.yaml.j2"
    dest: "{{ render_dir.path }}/namespace.yaml"

- name: Apply namespace
  ansible.builtin.command: "{{ kubectl_cmd | default('kubectl') }} apply -f {{ render_dir.path }}/namespace.yaml"
  become: true

- name: Render deployment template
  ansible.builtin.template:
    src: "{{ templates_dir }}/deployment.yaml.j2"
    dest: "{{ render_dir.path }}/deployment.yaml"

- name: Render service template
  ansible.builtin.template:
    src: "{{ templates_dir }}/service.yaml.j2"
    dest: "{{ render_dir.path }}/service.yaml"

- name: Render ingress template
  ansible.builtin.template:
    src: "{{ templates_dir }}/ingress.yaml.j2"
    dest: "{{ render_dir.path }}/ingress.yaml"
  when: ingress is defined and ingress.enabled

# Note: In a production scenario, you might want to handle the case where ingress is not enabled by either skipping the apply step or applying a default manifest that ensures no ingress is created.
- name: Ensure /home/ubuntuu/deployments directory exists
  ansible.builtin.file:
    path: /home/ubuntuu/deployments
    state: directory
    mode: '0755'

# Save rendered ingress manifest for inspection
- name: Save rendered ingress manifest for inspection
  ansible.builtin.copy:
    src: "{{ render_dir.path }}/ingress.yaml"
    dest: "/home/ubuntuu/deployments/{{ app.name }}-ingress.yaml"
    remote_src: yes
  when: ingress is defined and ingress.enabled

- name: Apply Kubernetes manifests
  ansible.builtin.command: "{{ kubectl_cmd | default('kubectl') }} apply -f {{ render_dir.path }}/"
  become: true

- name: Wait for rollout
  ansible.builtin.command: "{{ kubectl_cmd | default('kubectl') }} -n {{ app.namespace }} rollout status deployment/{{ app.name }}"
  become: true
