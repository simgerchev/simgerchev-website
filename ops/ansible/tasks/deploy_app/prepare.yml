---
- name: Set per-app paths
  ansible.builtin.set_fact:
    app_dir: "app/{{ deploy_app_name }}"
    app_vars_path: "{{ playbook_dir }}/apps/{{ deploy_app_name }}/app.yml"
    templates_dir: "{{ playbook_dir }}/templates"

- name: Validate app vars file
  ansible.builtin.stat:
    path: "{{ app_vars_path }}"
  register: app_vars_stat
  delegate_to: localhost
  become: false

- name: Fail when app vars file missing
  ansible.builtin.fail:
    msg: "App vars file '{{ app_vars_path }}' not found"
  when: not app_vars_stat.stat.exists

- name: Load app variables
  ansible.builtin.include_vars:
    file: "{{ app_vars_path }}"
