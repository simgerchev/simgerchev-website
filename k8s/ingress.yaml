apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simgerchev-website
  namespace: __NAMESPACE__
  labels:
    app: simgerchev-website
spec:
  ingressClassName: traefik
  rules:
    - host: __INGRESS_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: simgerchev-website
                port:
                  number: 80